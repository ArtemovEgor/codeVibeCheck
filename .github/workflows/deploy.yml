name: CI/CD - CodeVibeCheck

on:
  push:
    branches:
      - main
      - develop

jobs:
  # --- JOB 1: BACKEND DEPLOY (DOCKER) ---
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/codevibecheck-backend:latest

      - name: Deploy to DigitalOcean via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p /root/codeVibeCheck/backend/data
            cd /root/codeVibeCheck/backend

            echo "${{ secrets.ENV_FILE }}" > .env
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
            docker pull ${{ secrets.DOCKER_USERNAME }}/codevibecheck-backend:latest
            docker stop backend-test || true
            docker rm backend-test || true

            docker run -d \
              --name backend-test \
              -p 3001:3001 \
              --env-file .env \
              -e DB_PATH=/app/data/database.sqlite \
              -v $(pwd)/data:/app/data \
              --restart unless-stopped \
              ${{ secrets.DOCKER_USERNAME }}/codevibecheck-backend:latest

  # --- JOB 2: FRONTEND DEPLOY (GH PAGES) ---
  deploy-frontend:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: "./package-lock.json"

      - name: Install dependencies
        run: npm install

      - name: Build Frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_API_MODE: real

      - name: Deploy to GitHub Pages
        if: |
          github.event_name == 'push' && 
          (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/infra/vps-deploy')
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
