name: CI/CD - CodeVibeCheck

on:
  push:
    branches: 
      - main
      - develop
      - infra/vps-deploy

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/codevibecheck-backend:latest

      - name: Deploy to DigitalOcean via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /root/codeVibeCheck/backend
            mkdir -p data
            echo "${{ secrets.ENV_FILE }}" > .env
            
            docker pull ${{ secrets.DOCKER_USERNAME }}/codevibecheck-backend:latest
            docker stop backend-test || true
            docker rm backend-test || true
            
            docker run -d \
              --name backend-test \
              -p 3001:3001 \
              --env-file .env \
              -e DB_PATH=/app/data/database.sqlite \
              -v $(pwd)/data:/app/data \
              --restart unless-stopped \
              ${{ secrets.DOCKER_USERNAME }}/codevibecheck-backend:latest

  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install dependencies
        run: npm install
        working-directory: ./frontend

      - name: Build Frontend
        run: npm run build
        working-directory: ./frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_API_MODE: real

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend/dist